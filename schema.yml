        * `1` - 支付宝支付
        * `2` - 微信支付
        * `3` - 余额支付
        * `4` - 货到付款
    PayStatusEnum:
      enum:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 5
      type: integer
      description: |-
        * `0` - 已过期
        * `1` - 待支付
        * `2` - 待发货
        * `3` - 待收货
        * `4` - 待评价
        * `5` - 已完成
    Permission:
      type: object
      description: 权限序列化器
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: 名称
          maxLength: 255
        codename:
          type: string
          title: 代码名称
          maxLength: 100
        content_type:
          type: integer
          title: 内容类型
      required:
      - codename
      - content_type
      - id
      - name
    Register:
      type: object
      description: |-
        用户注册序列化器
        需要通过验证码验证邮箱的合法性
      properties:
        username:
          type: string
          title: 用户名
          description: 必填；长度为150个字符或以下；只能包含字母、数字、特殊字符“@”、“.”、“-”和“_”。
          pattern: ^[\w.@+-]+$
          maxLength: 150
        password:
          type: string
          writeOnly: true
          title: 密码
          maxLength: 128
        email:
          type: string
          format: email
          title: 邮箱
          maxLength: 150
          minLength: 3
        code:
          type: string
          writeOnly: true
          title: 验证码
          maxLength: 4
          minLength: 3
      required:
      - code
      - email
      - password
      - username
    ScoreEnum:
      enum:
      - 1
      - 2
      - 3
      - 4
      - 5
      type: integer
      description: |-
        * `1` - 1星
        * `2` - 2星
        * `3` - 3星
        * `4` - 4星
        * `5` - 5星
    TokenObtainPair:
      type: object
      description: 登录获取令牌
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    TokenVerify:
      type: object
      properties:
        token:
          type: string
          writeOnly: true
      required:
      - token
    TypeEnum:
      enum:
      - cart
      - sku
      type: string
      description: |-
        * `cart` - cart
        * `sku` - sku
    User:
      type: object
      description: 用户序列化器
      properties:
        id:
          type: integer
          readOnly: true
        groups:
          type: array
          items:
            $ref: '#/components/schemas/Group'
          readOnly: true
        user_permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
          readOnly: true
        password:
          type: string
          title: 密码
          maxLength: 128
        last_login:
          type: string
          format: date-time
          nullable: true
          title: 上次登录
        is_superuser:
          type: boolean
          title: 超级用户状态
          description: 指明该用户缺省拥有所有权限。
        username:
          type: string
          title: 用户名
          description: 必填；长度为150个字符或以下；只能包含字母、数字、特殊字符“@”、“.”、“-”和“_”。
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: 电子邮件地址
          maxLength: 254
        is_staff:
          type: boolean
          title: 工作人员状态
          description: 指明用户是否可以登录到这个管理站点。
        is_active:
          type: boolean
          title: 有效
          description: 指明用户是否被认为是活跃的。以反选代替删除帐号。
        date_joined:
          type: string
          format: date-time
          title: 加入日期
      required:
      - groups
      - id
      - password
      - user_permissions
      - username
    VerifyEmailCaptcha:
      type: object
      description: 校验邮箱验证码
      properties:
        email:
          type: string
          format: email
          title: 邮箱
          maxLength: 150
          minLength: 3
        code:
          type: string
          writeOnly: true
          title: 验证码
          maxLength: 4
          minLength: 3
      required:
      - code
      - email
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
